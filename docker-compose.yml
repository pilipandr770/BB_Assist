version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./workspace:/app/workspace
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - WORKSPACE_DIR=/app/workspace
      # Switch watchfiles from inotify → polling mode.
      # Prevents IO crashes when scan tools write heavily to /app/workspace volume.
      - WATCHFILES_FORCE_POLLING=true
    depends_on:
      - redis
    restart: unless-stopped
    # --reload-delay 1: check for code changes every 1s (polling is slower than inotify)
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/backend --reload-delay 1

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
