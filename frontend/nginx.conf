server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's internal DNS resolver — re-resolves "backend" every 10s.
    # Without this, nginx caches the IP at startup and returns 502 after
    # backend restarts (even though the container name stays the same).
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ {
        set $backend http://backend:8000;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;

        # Large buffers for program JSON (raw_text + plan can be 30KB+)
        proxy_buffering on;
        proxy_buffer_size 64k;
        proxy_buffers 8 64k;
        proxy_busy_buffers_size 128k;
    }

    # SSE endpoints need buffering off
    location ~ ^/api/scans/.*/stream {
        set $backend http://backend:8000;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
